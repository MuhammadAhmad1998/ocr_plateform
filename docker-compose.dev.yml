# Hot-reload development overrides:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  api:
    volumes:
      - ./ocr_platform:/app
      - ocr_storage:/app/storage
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    volumes:
      - ./ocr_platform:/app
      - ocr_storage:/app/storage

  # Hot-reload Kong config without restart
  kong:
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      # In hot-reload mode frontend still talks to Kong (8100)
      NEXT_PUBLIC_API_URL: http://localhost:8100/api/v1
    command: npm run dev
