# One-command full stack: docker compose up --build
# Optional overrides: copy .env.example to .env and edit (not required).

services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ocr_platform
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ocr_platform"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./ocr_platform
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:root@postgres:5432/ocr_platform
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ocr_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      start_period: 90s
      retries: 8
    restart: unless-stopped

  worker:
    build:
      context: ./ocr_platform
    command: celery -A workers.celery_app worker --loglevel=info
    env_file:
      - .env.docker
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:root@postgres:5432/ocr_platform
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ocr_storage:/app/storage
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Kong API Gateway ────────────────────────────────────────────────────
  # Public entry point for all API traffic.
  # HTTP  proxy  → host:8100  (instead of hitting FastAPI:8000 directly)
  # HTTPS proxy  → host:8443  (add TLS cert via KONG_SSL_* env vars or a reverse proxy)
  # Admin API    → internal only (127.0.0.1:8001 inside the container)
  kong:
    image: kong:3.7
    environment:
      KONG_DATABASE: "off"                   # DB-less declarative mode
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      KONG_ADMIN_LISTEN: "127.0.0.1:8001"
      KONG_LOG_LEVEL: warn
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ACCESS_LOG: /dev/null
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      # Allow Kong to use the shared Redis for rate-limiting
      KONG_NGINX_WORKER_PROCESSES: auto
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "8100:8000"    # HTTP  — frontend/clients call http://localhost:8100/api/v1
      - "8443:8443"    # HTTPS — add TLS cert for production
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Frontend talks to Kong (8100), not FastAPI (8000) directly
        NEXT_PUBLIC_API_URL: http://localhost:8100/api/v1
    ports:
      - "3000:3000"
    depends_on:
      kong:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  ocr_storage:
