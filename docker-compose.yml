# One-command full stack: docker compose up --build
# Optional overrides: copy .env.example to .env and edit (not required).

services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ocr_platform
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ocr_platform"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./ocr_platform
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:root@postgres:5432/ocr_platform
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ocr_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      start_period: 90s
      retries: 8
    restart: unless-stopped

  worker:
    build:
      context: ./ocr_platform
    command: celery -A workers.celery_app worker --loglevel=info
    env_file:
      - .env.docker
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:root@postgres:5432/ocr_platform
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ocr_storage:/app/storage
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  ocr_storage:
