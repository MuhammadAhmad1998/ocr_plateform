# Kong DB-less declarative configuration for Planet OCR Platform
# Documentation: https://docs.konghq.com/gateway/latest/production/deployment-topologies/db-less-and-declarative-config/
#
# Kong listens on:
#   HTTP  proxy  → 0.0.0.0:8000  (mapped to host port 8100 in docker-compose)
#   HTTPS proxy  → 0.0.0.0:8443  (mapped to host port 8443)
#   Admin API    → 127.0.0.1:8001 (internal only, not exposed)
#
# Upstream:  http://api:8000  (FastAPI container on the Docker network)

_format_version: "3.0"
_transform: true

###############################################################################
# Upstreams — define the FastAPI backend with health-checking
###############################################################################
upstreams:
  - name: ocr-api
    algorithm: round-robin
    healthchecks:
      active:
        type: http
        http_path: /health
        interval: 15
        timeout: 5
        healthy:
          successes: 2
          http_statuses: [200]
        unhealthy:
          http_failures: 3
          http_statuses: [500, 502, 503, 504]
    targets:
      - target: api:8000
        weight: 100

###############################################################################
# Services — one logical service for the OCR API
###############################################################################
services:
  - name: ocr-api-service
    url: http://ocr-api
    connect_timeout: 10000   # ms
    write_timeout: 60000     # ms  (OCR jobs can be slow)
    read_timeout: 120000     # ms
    retries: 2

    ###########################################################################
    # Routes
    ###########################################################################
    routes:

      # ── Stripe Webhook ── (must come before the general billing catch-all)
      # No auth plugins — Stripe calls this server-to-server using its own signature.
      # Body must not be modified (signature covers raw bytes).
      - name: stripe-webhook
        paths:
          - /api/v1/billing/webhook
        methods: [POST]
        strip_path: false
        preserve_host: false
        plugins:
          # Allow generous body size (Stripe events can have large metadata)
          - name: request-size-limiting
            config:
              allowed_payload_size: 2    # MB
          # Correlate to FastAPI X-Request-ID
          - name: correlation-id
            config:
              header_name: X-Request-ID
              generator: uuid
              echo_downstream: true

      # ── Billing (checkout, portal) — JWT auth in FastAPI, global rate limit ──
      - name: billing-api
        paths:
          - /api/v1/billing
        methods: [GET, POST, OPTIONS]
        strip_path: false
        preserve_host: false
        plugins:
          - name: rate-limiting
            config:
              minute: 30
              policy: redis
              redis_host: redis
              redis_port: 6379
              redis_database: 1
              fault_tolerant: true      # degrade gracefully if Redis is down
          - name: request-size-limiting
            config:
              allowed_payload_size: 1
          - name: correlation-id
            config:
              header_name: X-Request-ID
              generator: uuid
              echo_downstream: true

      # ── OCR Job routes — higher payload limit for file uploads ──
      - name: ocr-jobs
        paths:
          - /api/v1/ocr
          - /api/v2/ocr
        methods: [GET, POST, DELETE, OPTIONS]
        strip_path: false
        preserve_host: false
        plugins:
          - name: rate-limiting
            config:
              minute: 120
              policy: redis
              redis_host: redis
              redis_port: 6379
              redis_database: 1
              fault_tolerant: true
          - name: request-size-limiting
            config:
              # Must match MAX_UPLOAD_SIZE_MB + overhead
              allowed_payload_size: 12
          - name: correlation-id
            config:
              header_name: X-Request-ID
              generator: uuid
              echo_downstream: true

      # ── All other API v1 / v2 routes (auth, advisor, dashboard, admin, etc.) ──
      - name: api-general
        paths:
          - /api/v1
          - /api/v2
          - /internal
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        strip_path: false
        preserve_host: false
        plugins:
          - name: rate-limiting
            config:
              minute: 300
              policy: redis
              redis_host: redis
              redis_port: 6379
              redis_database: 1
              fault_tolerant: true
          - name: request-size-limiting
            config:
              allowed_payload_size: 10
          - name: correlation-id
            config:
              header_name: X-Request-ID
              generator: uuid
              echo_downstream: true

      # ── Health checks — no rate limiting ──
      - name: health
        paths:
          - /health
        methods: [GET]
        strip_path: false
        preserve_host: false

      # ── Swagger / ReDoc docs ──
      - name: api-docs
        paths:
          - /docs
          - /redoc
          - /openapi.json
        methods: [GET]
        strip_path: false
        preserve_host: false

###############################################################################
# Global plugins (applied to all routes unless overridden)
###############################################################################
plugins:
  # Structured access log (stdout → log aggregator)
  - name: file-log
    config:
      path: /dev/stdout
      reopen: false

  # Security headers on every response
  - name: response-transformer
    config:
      add:
        headers:
          - "X-Content-Type-Options:nosniff"
          - "X-Frame-Options:DENY"
          - "Referrer-Policy:strict-origin-when-cross-origin"
