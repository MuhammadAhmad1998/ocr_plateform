# Case Study: High-Volume Markdown Ingestion for RAG
# Confidence: heuristic (synthesized use case)

case_id: "infinity_rag_markdown_pipeline"
title: "Bulk PDF-to-Markdown for Enterprise Knowledge Base"
engine: "infinity-parser2-flash"
tier: "pro"

user_profile:
  role: "ML platform lead"
  organization: "Legal tech startup"
  goal: "Convert internal policy and contract PDFs to Markdown chunks for RAG retrieval"

document_characteristics:
  doc_type: "pdf"
  page_count: 8
  content:
    - "Printed English legal text"
    - "Numbered sections and subsections"
    - "Occasional simple tables"
  layout_complexity: "moderate"
  has_tables: true
  has_equations: false
  has_handwriting: false
  languages: ["en"]
  file_format: "PDF (born-digital and scanned)"

user_requirements:
  - "Clean Markdown suitable for chunking (512-token windows)"
  - "Fast processing — 3,000 pages/month"
  - "Minimal manual cleanup"
  - "API integration with existing ingestion worker"

why_infinity_parser2_flash:
  primary_reasons:
    - "doc2md produces Markdown in one API call per page"
    - "91.98% OmniDocBench-v1.6 overall document parsing quality"
    - "Flash variant prioritizes latency for high-volume ingestion"
    - "Pro tier API access with infinity-parser endpoints"

  specific_advantages:
    markdown_output: "Headings and lists preserved for semantic chunking"
    api_simplicity: "Same adapter for image and PDF analyze endpoints"
    cost: "Lower compute than Qianfan for text-heavy EN corpora"

alternative_considered:
  engine: "got-ocr2"
  reason_not_chosen: "GOT excels at LaTeX/TikZ and interactive OCR; legal PDFs are text-dominant"
  note: "GOT better if documents contain heavy formulas or need region OCR"

workflow:
  steps:
    1:
      action: "Worker calls POST /infinity-parser/pdf/analyze/"
      parameters: "task_type=doc2md, enable_thinking=false"
    2:
      action: "Concatenate per-page Markdown with page separators"
    3:
      action: "Chunk and embed into vector store"
    4:
      action: "Advisor RAG retrieves policy sections for user queries"

results:
  accuracy:
    text: "High fidelity on born-digital PDFs"
    tables: "Simple tables convert cleanly to Markdown"
    scans: "Acceptable with 144 DPI; deskew preprocessing helps"
    overall: "90%+ pages need no edits"

  processing_time:
    note: "Faster end-to-end than previous Paddle+Qianfan two-step trial"
    per_page: "TBD — benchmark needed"

  user_satisfaction: "high"
  post_processing_required: "Low — header hierarchy occasionally flattened"

lessons_learned:
  - "doc2md faster and simpler than doc2json for pure RAG text pipelines"
  - "Disable thinking for standard policy PDFs to save latency"
  - "Validate EN-only assumption; route non-EN docs to Qianfan"

cost_benefit:
  monthly_volume: "3,000 pages"
  tier: "Professional (within 5,000 quota)"
  outcome: "Enabled self-serve legal Q&A over internal corpus"
  roi: "Immediate vs manual copy-paste"

tags:
  - "rag"
  - "markdown"
  - "doc2md"
  - "bulk_processing"
  - "document_parsing"
  - "high_volume"

confidence: "high"
applicability: "Similar use cases: internal wikis, policy libraries, documentation portals, CMS migration"
