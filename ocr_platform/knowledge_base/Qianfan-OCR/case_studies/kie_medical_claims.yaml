    - "Mixed printed and handwritten"
    - "Semantic field understanding required"
    - "High-accuracy critical (financial, medical)"
  
  requirements:
    - "Enterprise tier (high volume)"
    - "GPU infrastructure (A100 recommended)"
    - "Validation and fallback workflows"
    - "Claims management system integration"

